#
# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-added-large-files" }
]

[[repos]]
repo = "https://github.com/fsfe/reuse-tool"
rev = "a1bb792acda6fd0724936b4ebbdbc8eceb9c0459"  # frozen: v6.2.0
hooks = [
  { id = "reuse" }
]

[[repos]]
repo = "https://github.com/rbubley/mirrors-prettier"
rev = "06507ab9500d4a9919b5ebd76d9d5b7074f15c1f"  # frozen: v3.8.4
hooks = [
  { id = "prettier" }
]

[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "5030dca3047414c338091455ac41803200ec1f0f"  # frozen: 0.37.3
hooks = [
  { id = "check-taskfile" }
]

[[repos]]
repo = "https://github.com/DavidAnson/markdownlint-cli2"
rev = "996abf60411a8d954288ac9856aae7602b80cbda"  # frozen: v0.22.1
hooks = [
  { id = "markdownlint-cli2" }
]

[[repos]]
repo = "https://github.com/adrienverge/yamllint.git"
rev = "cba56bcde1fdd01c1deb3f945e69764c291a6530"  # frozen: v1.38.0
hooks = [
  {
    id = "yamllint",
    args = ["--strict"]
  }
]
