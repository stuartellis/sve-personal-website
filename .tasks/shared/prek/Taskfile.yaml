# Tasks for prek:
#
# - https://prek.j178.dev/

version: "3.38"

silent: true

vars:
  PREK_EXE: "prek"

tasks:
  default:
    cmds:
      - task: check

  check:
    desc: Check the project
    cmds:
      - "{{.PREK_EXE}} run --all-files"

  run:
    desc: Run a specific check on the project
    cmds:
      - "{{.PREK_EXE}} run {{.HOOK_ID}} --all-files"
    requires:
      vars: [HOOK_ID]

  setup:
    desc: Setup hooks for use
    cmds:
      - "{{.PREK_EXE}} install"
