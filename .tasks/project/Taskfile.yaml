version: "3.38"

silent: true

tasks:


  bootstrap:
    desc: Set up environment for development
    aliases: [setup]
    cmds:
      - task: pre-commit:setup

  clean:
    desc: Delete generated files
    cmds:
      - task: hugo:clean
      - for: ["tmp"]
        cmd: rm -fr {{.ITEM}}

  deploy:
    desc: Deploy Website
    cmds:
      - task: hugo:deploy

  dev:
    desc: Run generated Website
    aliases: [serve]
    cmds:
      - task: hugo:serve

  lint:
    desc: Run all checks
    aliases: [check, test]
    cmds:
      - task: pre-commit:check
